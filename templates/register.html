<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | ISSUE REPORTING</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <main class="page">

    <section class="card">

      <div class="brand">
        <div class="logo">CCIT</div>
        <div>
          <h1>CREATE ACCOUNT</h1>
          <p>Student registration only.</p>
        </div>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div style="margin-bottom:12px;">
            {% for category, message in messages %}
              <div style="
                padding:10px 12px;
                border-radius:12px;
                border:1px solid rgba(255,255,255,0.12);
                background: rgba(255,255,255,0.08);
                color: rgba(234,240,255,0.95);
                font-size: 13px;
                margin-bottom: 8px;
                text-align:center;
              ">
                {{ message }}
              </div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form class="form" method="POST" action="/register">

        <div class="field">
          <label for="fullname">Full Name</label>
          <input
            id="fullname"
            name="fullname"
            type="text"
            placeholder="Juan Dela Cruz"
            required
          >
        </div>

        <div class="field">
          <label for="student_id">Student ID</label>
          <input
            id="student_id"
            name="student_id"
            type="text"
            placeholder="e.g. 2023-00001"
            required
          >
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input
            id="email"
            name="email"
            type="text"
            placeholder="Enter email"
            required
          >
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="password-wrap">
            <input
              id="password"
              name="password"
              type="password"
              placeholder="••••••••"
              required
            >
            <button type="button" class="toggle" onclick="togglePassword()">Show</button>
          </div>
        </div>

        <div class="field">
          <label for="confirm_password">Confirm Password</label>
          <input
            id="confirm_password"
            name="confirm_password"
            type="password"
            placeholder="••••••••"
            required
          >
        </div>

        <button class="btn" type="submit">Create account</button>

        <p class="footer">
          Already have an account?
          <a class="link" href="/">Sign in</a>
        </p>

      </form>

    </section>

  </main>

  <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
